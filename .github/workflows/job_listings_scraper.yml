name: SAP Job Listings Scraper

on:
  schedule:
    - cron: '0 3 * * *'  # 08:30 IST (UTC+5:30)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir \
            "supabase==2.12.0" \
            "httpx==0.27.2" \
            "websockets==13.1" \
            "selenium==4.20.0" \
            "pandas==2.2.2" \
            "python-dotenv==1.0.1" \
            "python-dateutil==2.9.0" \
            "openpyxl==3.1.2" \
            "webdriver-manager==4.0.1" \
            "azure-identity==1.17.1" \
            "msgraph-sdk==1.5.4" \
            "requests>=2.31.0"
          echo "--- Installed versions ---"
          pip show supabase gotrue httpx websockets requests | grep -E "Name|Version"

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install ChromeDriver
        run: |
          CHROME_VER=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VER"
          DRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VER}/linux64/chromedriver-linux64.zip"
          wget -q "$DRIVER_URL" -O /tmp/chromedriver.zip
          unzip -q /tmp/chromedriver.zip -d /tmp/
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version
          echo "CHROMEDRIVER_PATH=/usr/local/bin/chromedriver" >> $GITHUB_ENV

      - name: Create .env file
        run: |
          printf "SUPABASE_URL=%s\n"        "$SUPABASE_URL"        >  .env
          printf "SUPABASE_KEY=%s\n"        "$SUPABASE_KEY"        >> .env
          printf "SAP_COMPANY_ID=%s\n"      "$SAP_COMPANY_ID"      >> .env
          printf "SAP_AGENCY_ID=%s\n"       "$SAP_AGENCY_ID"       >> .env
          printf "SAP_EMAIL=%s\n"           "$SAP_EMAIL"           >> .env
          printf "SAP_PASSWORD=%s\n"        "$SAP_PASSWORD"        >> .env
          printf "CHROMEDRIVER_PATH=/usr/local/bin/chromedriver\n" >> .env
          printf "AZURE_TENANT_ID=%s\n"     "$AZURE_TENANT_ID"     >> .env
          printf "AZURE_CLIENT_ID=%s\n"     "$AZURE_CLIENT_ID"     >> .env
          printf "AZURE_CLIENT_SECRET=%s\n" "$AZURE_CLIENT_SECRET" >> .env
          printf "EMAIL_FROM=%s\n"          "$EMAIL_FROM"          >> .env
          printf "EMAIL_TO=%s\n"            "$EMAIL_TO"            >> .env
          printf "EMAIL_CC=%s\n"            "$EMAIL_CC"            >> .env
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          SAP_COMPANY_ID:      ${{ secrets.SAP_COMPANY_ID }}
          SAP_AGENCY_ID:       ${{ secrets.SAP_AGENCY_ID }}
          SAP_EMAIL:           ${{ secrets.SAP_EMAIL }}
          SAP_PASSWORD:        ${{ secrets.SAP_PASSWORD }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
          EMAIL_CC:            ${{ secrets.EMAIL_CC }}

      - name: Run SAP job listings scraper
        run: python job_listings_scraper.py

      - name: Send daily email report
        if: always()
        run: python send_daily_email.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-${{ github.run_id }}
          path: |
            *.log
            *.xlsx
            login_error.*
            error_job_*
          retention-days: 7
          if-no-files-found: ignore
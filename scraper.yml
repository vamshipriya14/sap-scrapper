name: SAP Job Listings Scraper

on:
  schedule:
    - cron: '0 * * * *'   # Every hour at :00
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55    # Safety cutoff just under 1 hour

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Python dependencies ───────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Install Chrome + matching ChromeDriver ─────────────────────────
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install ChromeDriver
        run: |
          CHROME_VER=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          DRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VER}/linux64/chromedriver-linux64.zip"
          wget -q "$DRIVER_URL" -O /tmp/chromedriver.zip || \
            wget -q "https://chromedriver.storage.googleapis.com/LATEST_RELEASE" -O /tmp/latest && \
            wget -q "https://chromedriver.storage.googleapis.com/$(cat /tmp/latest)/chromedriver_linux64.zip" -O /tmp/chromedriver.zip
          unzip -q /tmp/chromedriver.zip -d /tmp/
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver 2>/dev/null || \
            sudo mv /tmp/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      # ── 5. Write .env from GitHub Secrets ────────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SAP_COMPANY_ID=${{ secrets.SAP_COMPANY_ID }}
          SAP_AGENCY_ID=${{ secrets.SAP_AGENCY_ID }}
          SAP_EMAIL=${{ secrets.SAP_EMAIL }}
          SAP_PASSWORD=${{ secrets.SAP_PASSWORD }}
          EOF

      # ── 6. Run the scraper ────────────────────────────────────────────────
      - name: Run SAP job listings scraper
        run: python job_listings_scraper.py

      # ── 7. Upload artifacts (logs + Excel) for debugging ─────────────────
      - name: Upload logs and Excel output
        if: always()   # Run even if scraper fails
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-${{ github.run_id }}
          path: |
            *.log
            *.xlsx
            login_error.*
            error_job_*
          retention-days: 7
